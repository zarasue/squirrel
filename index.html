<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Squirrel</title>
<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">

<!-- iOS home screen -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<!-- Android / PWA -->
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">

<meta name="theme-color" content="#f5f0c8">
<link href="https://fonts.googleapis.com/css2?family=Hedvig+Letters+Serif:opsz@12..24&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --yellow: #f5f0c8;
  --brown:  #2e1f1f;
  --blue1:  #b8d4e8;
  --blue2:  #c8d8e4;
  --white:  #ffffff;
  --muted:  rgba(46,31,31,0.45);
  --pad: clamp(1.2rem, 5vw, 3rem);
}
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Hedvig Letters Serif', Georgia, serif; background: var(--yellow); color: var(--brown); }

.screen { position: fixed; inset: 0; transition: opacity 0.5s ease, transform 0.5s ease; }
.screen.hidden { opacity: 0; pointer-events: none; transform: translateY(12px); }

/* ── LOADING ── */
.loading-overlay { position: fixed; inset: 0; z-index: 500; background: var(--yellow); display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.35s ease; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brown); opacity: 0.35; animation: dotBounce 1.1s ease-in-out infinite; }
.loading-dot:nth-child(1) { animation-delay: 0s; }
.loading-dot:nth-child(2) { animation-delay: 0.18s; }
.loading-dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes dotBounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
  40% { transform: translateY(-10px); opacity: 0.9; }
}

/* ── OPENING ── */
#screen-open { background: var(--yellow); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.4rem; overflow: hidden; }
.open-title { font-size: clamp(2.4rem, 10vw, 5rem); font-weight: 400; letter-spacing: -0.02em; color: var(--brown); line-height: 1; transition: transform 0.4s ease, opacity 0.4s ease; }
.open-sub { font-size: clamp(0.8rem, 3vw, 1.1rem); color: var(--brown); opacity: 0.65; transition: transform 0.4s ease, opacity 0.4s ease; }
.open-hint { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--brown); opacity: 0; position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%); white-space: nowrap; animation: hintFade 2s ease 1.2s forwards; pointer-events: none; }
@keyframes hintFade { 0%{opacity:0;transform:translateX(-50%) translateY(6px)} 40%{opacity:0.35;transform:translateX(-50%) translateY(0)} 80%{opacity:0.35} 100%{opacity:0.15;transform:translateX(-50%) translateY(0)} }
#screen-open.dragging .open-title, #screen-open.dragging .open-sub { transition: none; }

/* ── MENU ── */
#screen-menu { background: var(--yellow); display: flex; flex-direction: column; padding: var(--pad); justify-content: center; gap: 0; }
@media (min-width: 600px) { #screen-menu { flex-direction: row; align-items: center; padding: 0 6vw; } }
.menu-left { display: flex; flex-direction: column; gap: 2rem; flex: 1; }
.menu-logo-row { display: flex; align-items: baseline; gap: 1.2rem; }
.menu-logo { font-size: clamp(1.8rem, 6vw, 2.6rem); font-weight: 400; letter-spacing: -0.02em; color: var(--brown); }
.menu-add { font-size: clamp(1.8rem, 6vw, 2.6rem); font-weight: 400; color: var(--blue1); cursor: pointer; transition: opacity 0.15s; letter-spacing: -0.02em; }
.menu-add:hover, .menu-add:active { opacity: 0.65; }
.menu-timeline { display: flex; flex-direction: column; align-items: flex-start; margin-top: 2.5rem; }
@media (min-width: 600px) { .menu-timeline { align-items: flex-end; margin-top: 0; padding-right: 2vw; } }
.tl-item { display: flex; flex-direction: column; align-items: flex-start; }
@media (min-width: 600px) { .tl-item { align-items: flex-end; } }
.tl-year { font-size: clamp(2rem, 8vw, 3.2rem); font-weight: 400; letter-spacing: -0.03em; color: var(--brown); cursor: pointer; transition: opacity 0.15s; line-height: 1.15; padding: 0.15rem 0; }
.tl-year:hover, .tl-year:active { opacity: 0.5; }
.tl-line { width: 1px; height: clamp(1.5rem, 3vh, 3rem); background: var(--brown); opacity: 0.3; margin-left: 0.1rem; }
@media (min-width: 600px) { .tl-line { margin-left: 0; margin-right: 0.1rem; } }
.menu-empty { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.menu-scroll-hint { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--brown); opacity: 0; position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); white-space: nowrap; pointer-events: none; animation: hintFade 2s ease 1.8s forwards; }

/* ── GALLERY ── */
#screen-gallery { background: var(--brown); display: flex; flex-direction: column; overflow: hidden; transform: translateY(100%); opacity: 1; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); }
#screen-gallery.visible { transform: translateY(0); }
#screen-gallery.hidden { transform: translateY(100%); opacity: 1; pointer-events: none; }
.gallery-topbar { display: flex; align-items: baseline; justify-content: space-between; padding: clamp(1.2rem, 4vw, 2rem) var(--pad) clamp(0.8rem, 2vw, 1.2rem); flex-shrink: 0; }
.gallery-title { font-size: clamp(1.2rem, 5vw, 2rem); font-weight: 400; letter-spacing: -0.02em; color: var(--yellow); opacity: 0.7; cursor: pointer; transition: opacity 0.15s; }
.gallery-title:hover { opacity: 1; }
.gallery-logo { font-size: clamp(1.2rem, 5vw, 2rem); font-weight: 400; color: var(--yellow); cursor: pointer; opacity: 0.7; letter-spacing: -0.02em; }
.gallery-logo:hover { opacity: 1; }
.gallery-wrap { flex: 1; overflow-y: auto; padding: 0 var(--pad) 3rem; -webkit-overflow-scrolling: touch; }
.gallery-masonry { columns: 3; column-gap: clamp(4px, 1vw, 8px); }
@media (max-width: 500px) { .gallery-masonry { columns: 2; } }
.gallery-item { break-inside: avoid; margin-bottom: clamp(4px, 1vw, 8px); cursor: pointer; position: relative; overflow: hidden; display: block; }
.gallery-item img { width: 100%; display: block; object-fit: cover; transition: transform 0.25s ease; }
.gallery-item .gallery-overlay { position: absolute; inset: 0; background: rgba(46,31,31,0); transition: background 0.25s ease; display: flex; align-items: flex-end; justify-content: flex-end; padding: 8px 10px; pointer-events: none; }
.gallery-item:hover .gallery-overlay { background: rgba(46,31,31,0.35); }
.gallery-item .gallery-caption { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 400; color: #f5f0c8; text-shadow: 0 1px 3px rgba(0,0,0,0.4); text-align: right; line-height: 1.4; max-width: 90%; opacity: 0; transition: opacity 0.25s ease; }
.gallery-item:hover .gallery-caption { opacity: 1; }
.gallery-empty { color: var(--yellow); opacity: 0.4; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; padding: 4rem 0; text-align: center; }

/* ── YEAR ── */
#screen-year { background: var(--brown); display: flex; flex-direction: column; overflow: hidden; }
.year-topbar { display: flex; align-items: baseline; justify-content: space-between; padding: clamp(1.2rem, 4vw, 2rem) var(--pad) clamp(1rem, 3vw, 1.5rem); flex-shrink: 0; }
.year-topbar-left { display: flex; align-items: baseline; gap: clamp(0.8rem, 3vw, 1.5rem); }
.year-num-label { font-size: clamp(1.2rem, 5vw, 2rem); font-weight: 400; letter-spacing: -0.02em; color: var(--yellow); cursor: pointer; transition: opacity 0.15s; }
.year-num-label:hover, .year-num-label:active { opacity: 0.6; }
.year-add-link { font-size: clamp(1.2rem, 5vw, 2rem); font-weight: 400; color: var(--blue1); cursor: pointer; transition: opacity 0.15s; letter-spacing: -0.02em; }
.year-add-link:hover, .year-add-link:active { opacity: 0.65; }
.year-logo-right { font-size: clamp(1.2rem, 5vw, 2rem); font-weight: 400; color: var(--yellow); cursor: pointer; opacity: 0.7; letter-spacing: -0.02em; }
.year-logo-right:hover, .year-logo-right:active { opacity: 1; }
.year-grid-wrap { flex: 1; overflow-y: auto; padding: 0 var(--pad) clamp(2rem, 6vw, 3rem); -webkit-overflow-scrolling: touch; }
.year-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(3px, 1vw, 6px); }
@media (max-width: 380px) { .year-grid { grid-template-columns: repeat(2, 1fr); } }
.grid-item { aspect-ratio: 1; cursor: pointer; overflow: hidden; background: var(--blue2); transition: transform 0.25s ease, box-shadow 0.25s ease; position: relative; }
.grid-item:hover { box-shadow: 0 8px 24px rgba(46,31,31,0.22); z-index: 1; }
.grid-item:active { transform: scale(0.98); }
.grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.grid-item .grid-overlay { position: absolute; inset: 0; background: rgba(46,31,31,0); transition: background 0.25s ease; display: flex; align-items: flex-end; justify-content: flex-end; padding: 8px 10px; pointer-events: none; }
.grid-item:hover .grid-overlay { background: rgba(46,31,31,0.35); }
.grid-item .grid-caption { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 400; color: #f5f0c8; text-shadow: 0 1px 3px rgba(0,0,0,0.4); text-align: right; line-height: 1.4; max-width: 90%; opacity: 0; transition: opacity 0.25s ease; }
.grid-item:hover .grid-caption { opacity: 1; }
.grid-item-pdf { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.55rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--brown); opacity: 0.7; }
.gi-y { background: var(--yellow); } .gi-b1 { background: var(--blue1); } .gi-b2 { background: var(--blue2); }
.year-empty { color: var(--yellow); opacity: 0.4; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; padding: 4rem 0; text-align: center; }

/* ── ART MODAL ── */
#art-modal { position: fixed; inset: 0; z-index: 100; background: rgba(46,31,31,0.78); display: flex; align-items: center; justify-content: center; padding: clamp(0.8rem, 4vw, 2rem); animation: fi 0.2s ease; }
#art-modal.hidden { display: none; }
@keyframes fi { from{opacity:0}to{opacity:1} }
.art-modal-outer { display: flex; align-items: center; gap: clamp(0.6rem, 2vw, 1.2rem); width: 100%; max-width: 720px; }
.art-arrow { all: unset; cursor: pointer; opacity: 0.3; transition: opacity 0.2s; padding: 0.5rem; flex-shrink: 0; display: flex; align-items: center; }
.art-arrow:hover { opacity: 0.65; }
.art-arrow:disabled { opacity: 0.08; cursor: default; }
.art-arrow svg { width: 26px; height: 26px; display: block; stroke: var(--yellow); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.art-modal-inner { position: relative; flex: 1; min-width: 0; max-width: 580px; background: var(--white); box-shadow: 0 20px 60px rgba(0,0,0,0.35); animation: si 0.22s ease; max-height: 90vh; display: flex; flex-direction: column; transition: max-width 0.25s ease; }
.art-modal-inner.portrait { max-width: 320px; }
@keyframes si { from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)} }
.art-modal-media { width: 100%; flex: 1; min-height: 0; background: var(--yellow); overflow: hidden; display: block; line-height: 0; font-size: 0; max-height: 70vh; }
.art-modal-media img { width: 100%; height: 100%; object-fit: contain; display: block; border: none; outline: none; box-shadow: none; max-height: 70vh; }
.art-modal-media-pdf { display: flex; align-items: center; justify-content: center; min-height: 200px; font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--brown); opacity: 0.5; text-align: center; padding: 3rem 2rem; }
.art-modal-close { all: unset; cursor: pointer; position: absolute; top: 0.7rem; right: 0.8rem; font-size: 1.1rem; color: var(--brown); opacity: 0.35; font-family: 'Hedvig Letters Serif', serif; padding: 0.3rem; z-index: 2; transition: opacity 0.15s; }
.art-modal-close:hover { opacity: 0.7; }
.art-modal-info { padding: 0.75rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 0.8rem; flex-shrink: 0; }
.art-modal-info-text { flex: 1; min-width: 0; font-family: 'Hedvig Letters Serif', serif; font-size: 0.8rem; font-style: italic; color: var(--brown); opacity: 0.55; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.art-icon-btns { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
.art-icon-btn { all: unset; cursor: pointer; padding: 0.35rem; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
.art-icon-btn svg { width: 15px; height: 15px; display: block; stroke: var(--brown); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.35; transition: opacity 0.18s; }
.art-edit-panel { padding: 0 1rem 1rem; background: var(--white); display: none; flex-direction: column; gap: 0.65rem; flex-shrink: 0; }
.art-edit-panel.open { display: flex; }
.art-field-label { font-family: 'Inter', sans-serif; font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--brown); opacity: 0.35; margin-bottom: 4px; display: block; }
.art-edit-input { all: unset; display: block; width: 100%; background: #f8f5ed; border-radius: 6px; padding: 0.45rem 0.65rem; font-family: 'Hedvig Letters Serif', serif; font-size: 0.85rem; font-style: italic; color: var(--brown); color-scheme: light; box-sizing: border-box; }
.art-edit-input:focus { background: #f3efe4; }
.art-edit-save { all: unset; cursor: pointer; background: var(--brown); color: var(--yellow); font-family: 'Inter', sans-serif; font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase; padding: 0.6rem 1.2rem; border-radius: 6px; align-self: flex-start; margin-top: 0.2rem; transition: opacity 0.15s; display: inline-block; }
.art-edit-save:hover { opacity: 0.7; }

/* ── ADD MODAL ── */
#modal-add { position: fixed; inset: 0; z-index: 200; background: rgba(46,31,31,0.55); display: flex; align-items: flex-end; justify-content: center; animation: fi 0.2s ease; }
@media (min-width: 600px) { #modal-add { align-items: center; } }
#modal-add.hidden { display: none; }
.add-card { background: var(--yellow); width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; padding: clamp(1.5rem, 5vw, 2.5rem); position: relative; animation: slideUp 0.25s ease; border-radius: 12px 12px 0 0; -webkit-overflow-scrolling: touch; }
@media (min-width: 600px) { .add-card { border-radius: 0; animation: si 0.2s ease; } }
@keyframes slideUp { from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)} }
.add-title { font-size: clamp(1.6rem, 5vw, 2rem); font-weight: 400; letter-spacing: -0.02em; color: var(--brown); margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(46,31,31,0.2); }
.add-close { position: absolute; top: 1rem; right: 1.2rem; background: none; border: none; font-size: 1.1rem; cursor: pointer; color: var(--brown); opacity: 0.45; font-family: 'Hedvig Letters Serif', serif; padding: 0.3rem; }
.add-close:active { opacity: 1; }
.form-row { margin-bottom: 1.1rem; }
.form-label { display: block; font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--brown); opacity: 0.55; margin-bottom: 0.35rem; }
.form-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(46,31,31,0.3); padding: 0.5rem 0; font-family: 'Hedvig Letters Serif', serif; font-size: 1rem; color: var(--brown); outline: none; }
.form-input:focus { border-bottom-color: var(--brown); }
textarea.form-input { border: 1px solid rgba(46,31,31,0.25); padding: 0.6rem; min-height: 68px; resize: none; }
textarea.form-input:focus { border-color: var(--brown); }
.form-2col { display: flex; gap: 1.2rem; }
.form-2col > * { flex: 1; }
.file-zone { background: rgba(46,31,31,0.07); border: 1px solid rgba(46,31,31,0.2); padding: 1.6rem 1rem; text-align: center; cursor: pointer; transition: background 0.15s; }
.file-zone:active { background: rgba(46,31,31,0.12); }
.file-zone input { display: none; }
.file-zone-text { font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--brown); opacity: 0.5; line-height: 2; }
.file-prev { max-height: 70px; max-width: 100%; display: block; margin: 0.5rem auto 0; object-fit: contain; }
.submit-btn { width: 100%; background: var(--brown); color: var(--yellow); border: none; padding: 1rem; font-family: 'Hedvig Letters Serif', serif; font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.15s; }
.submit-btn:active { opacity: 0.75; }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.upload-progress { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--brown); opacity: 0.5; text-align: center; margin-top: 0.6rem; min-height: 1rem; }
</style>
</head>
<body>

<div class="loading-overlay hidden" id="loading-overlay">
  <div class="loading-dot"></div>
  <div class="loading-dot"></div>
  <div class="loading-dot"></div>
</div>

<!-- OPENING -->
<div class="screen" id="screen-open">
  <div class="open-title" id="open-title">Squirrel.</div>
  <div class="open-sub" id="open-sub">your digital archive.</div>
  <div class="open-hint">scroll or swipe up</div>
</div>

<!-- MENU -->
<div class="screen hidden" id="screen-menu">
  <div class="menu-left">
    <div class="menu-logo-row">
      <div class="menu-logo">Squirrel.</div>
      <div class="menu-add" id="menu-add-btn">Add</div>
    </div>
  </div>
  <div class="menu-timeline" id="menu-timeline"></div>
  <div class="menu-scroll-hint">scroll down for all memories</div>
</div>

<!-- GALLERY -->
<div class="screen hidden" id="screen-gallery">
  <div class="gallery-topbar">
    <div class="gallery-title" id="gallery-back-btn">↑ Menu</div>
    <div class="gallery-logo" id="gallery-logo-btn">Squirrel.</div>
  </div>
  <div class="gallery-wrap" id="gallery-wrap">
    <div class="gallery-masonry" id="gallery-masonry"></div>
  </div>
</div>

<!-- YEAR -->
<div class="screen hidden" id="screen-year">
  <div class="year-topbar">
    <div class="year-topbar-left">
      <div class="year-num-label" id="year-back-btn"></div>
      <div class="year-add-link" id="year-add-btn">Add</div>
    </div>
    <div class="year-logo-right" id="year-logo-btn">Squirrel.</div>
  </div>
  <div class="year-grid-wrap">
    <div class="year-grid" id="year-grid"></div>
  </div>
</div>

<!-- ART MODAL -->
<div id="art-modal" class="hidden">
  <div class="art-modal-outer">
    <button class="art-arrow" id="art-prev-btn" disabled>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="art-modal-inner">
      <button class="art-modal-close" id="art-close-btn">✕</button>
      <div class="art-modal-media" id="art-modal-media"></div>
      <div class="art-modal-info">
        <div class="art-modal-info-text" id="art-modal-text"></div>
        <div class="art-icon-btns">
          <button class="art-icon-btn" id="art-edit-btn" title="Edit">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="art-icon-btn" id="art-del-btn" title="Delete">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>
      <div class="art-edit-panel" id="art-edit-panel">
        <div>
          <div class="art-field-label">Date</div>
          <input class="art-edit-input" type="date" id="art-date-input">
        </div>
        <div>
          <div class="art-field-label">Note</div>
          <input class="art-edit-input" type="text" id="art-note-input" placeholder="Add a note…">
        </div>
        <button class="art-edit-save" id="art-save-btn">Save changes</button>
      </div>
    </div>
    <button class="art-arrow" id="art-next-btn" disabled>
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<!-- ADD MODAL -->
<div id="modal-add" class="hidden">
  <div class="add-card">
    <div class="add-title">Add a memory.</div>
    <button class="add-close" id="add-close-btn">✕</button>
    <div class="form-row">
      <label class="form-label">File — image or PDF</label>
      <div class="file-zone" id="file-zone">
        <input type="file" id="file-input" accept="image/*,application/pdf">
        <div class="file-zone-text" id="file-zone-text">Tap to upload</div>
        <div id="file-preview"></div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-2col">
        <div>
          <label class="form-label">Year</label>
          <input class="form-input" type="number" id="form-year" placeholder="2024" min="1900" max="2100" inputmode="numeric">
        </div>
        <div>
          <label class="form-label">Date — optional</label>
          <input class="form-input" type="date" id="form-date">
        </div>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Note — optional</label>
      <textarea class="form-input" id="form-note" placeholder="What is this?"></textarea>
    </div>
    <button class="submit-btn" id="form-submit">Save to Squirrel</button>
    <div class="upload-progress" id="upload-progress"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://elweznxsfubcciqswtim.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_YaIRxTVRcXwuWUEQ_0OR0A_Cw7-3q_-';

async function sbFetch(path, opts={}) {
  return fetch(SUPABASE_URL+path, { ...opts, headers: { 'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json',...(opts.headers||{}) } });
}
async function dbSelect(table,query=''){const r=await sbFetch(`/rest/v1/${table}?${query}&order=created_at.desc`);if(!r.ok)throw new Error(await r.text());return r.json();}
async function dbInsert(table,data){const r=await sbFetch(`/rest/v1/${table}`,{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify(data)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function dbUpdate(table,id,data){const r=await sbFetch(`/rest/v1/${table}?id=eq.${id}`,{method:'PATCH',headers:{'Prefer':'return=representation'},body:JSON.stringify(data)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function dbDelete(table,id){const r=await sbFetch(`/rest/v1/${table}?id=eq.${id}`,{method:'DELETE'});if(!r.ok)throw new Error(await r.text());}
async function storageUpload(bucket,path,file){const r=await fetch(`${SUPABASE_URL}/storage/v1/object/${bucket}/${path}`,{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':file.type,'x-upsert':'true'},body:file});if(!r.ok)throw new Error(await r.text());return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${path}`;}
async function storageDelete(bucket,path){const r=await sbFetch(`/storage/v1/object/${bucket}`,{method:'DELETE',body:JSON.stringify({prefixes:[path]})});if(!r.ok)throw new Error(await r.text());}

let memories=[],activeYear=null,viewMem=null,addingFromYear=null;
let pendingFile=null,pendingFileType=null,pendingFileName=null;

const GRID_ACCENTS=['gi-b2','gi-b1','gi-y'];
function hash(id){let h=0;for(const c of String(id))h=(h*31+c.charCodeAt(0))&0xfffffff;return h;}
function accentCls(id){return GRID_ACCENTS[hash(id)%GRID_ACCENTS.length];}
function getYears(){const m={};memories.forEach(x=>{m[x.year]=(m[x.year]||0)+1;});return Object.entries(m).sort((a,b)=>b[0]-a[0]);}
function forYear(y){return memories.filter(x=>x.year==y);}

const allScreens=['open','menu','year','gallery'];
function showScreen(name){allScreens.forEach(s=>{const el=document.getElementById('screen-'+s);if(s===name){el.classList.remove('hidden');if(s==='gallery')el.classList.add('visible');}else{if(s==='gallery'){el.classList.remove('visible');el.classList.add('hidden');}else el.classList.add('hidden');}});}
function showLoading(v){document.getElementById('loading-overlay').classList.toggle('hidden',!v);}

// Opening gesture
const openScreen=document.getElementById('screen-open');
const openTitle=document.getElementById('open-title');
const openSub=document.getElementById('open-sub');
let openDone=false;

async function triggerOpen(){
  if(openDone)return;
  openDone=true;
  openTitle.style.transform='translateY(-40px)';openTitle.style.opacity='0';
  openSub.style.transform='translateY(-24px)';openSub.style.opacity='0';
  setTimeout(async()=>{
    showLoading(true);
    try{memories=await dbSelect('memories');}catch(e){alert('Could not load memories: '+e.message);}
    showLoading(false);
    showScreen('menu');renderMenu();
    setTimeout(()=>{openDone=false;openTitle.style.transform='';openTitle.style.opacity='';openSub.style.transform='';openSub.style.opacity='';},600);
  },380);
}

openScreen.addEventListener('wheel',(e)=>{if(e.deltaY>30)triggerOpen();},{passive:true});

let touchStartY=0;
openScreen.addEventListener('touchstart',(e)=>{
  touchStartY=e.touches[0].clientY;
  openScreen.classList.add('dragging');
  const onMove=(e)=>{
    const dy=touchStartY-e.touches[0].clientY;
    if(dy>0){const p=Math.min(dy/120,1);openTitle.style.transform=`translateY(${-p*40}px)`;openTitle.style.opacity=1-p*0.85;openSub.style.transform=`translateY(${-p*24}px)`;openSub.style.opacity=1-p*0.85;}
  };
  const onEnd=(e)=>{
    openScreen.classList.remove('dragging');
    const dy=touchStartY-e.changedTouches[0].clientY;
    if(dy>60){triggerOpen();}
    else{
      openTitle.style.transition='transform 0.3s ease, opacity 0.3s ease';openSub.style.transition='transform 0.3s ease, opacity 0.3s ease';
      openTitle.style.transform='';openTitle.style.opacity='';openSub.style.transform='';openSub.style.opacity='';
      setTimeout(()=>{openTitle.style.transition='';openSub.style.transition='';},320);
    }
    openScreen.removeEventListener('touchmove',onMove);openScreen.removeEventListener('touchend',onEnd);
  };
  openScreen.addEventListener('touchmove',onMove,{passive:true});
  openScreen.addEventListener('touchend',onEnd);
},{passive:true});

// Menu
function renderMenu(){
  const tl=document.getElementById('menu-timeline');tl.innerHTML='';
  const years=getYears();
  if(!years.length){tl.innerHTML='<div class="menu-empty">No memories yet</div>';return;}
  years.forEach(([yr],i)=>{
    const item=document.createElement('div');item.className='tl-item';
    const yEl=document.createElement('div');yEl.className='tl-year';yEl.textContent=yr;
    yEl.onclick=()=>{activeYear=yr;showScreen('year');renderYear();};
    item.appendChild(yEl);
    if(i<years.length-1){const line=document.createElement('div');line.className='tl-line';item.appendChild(line);}
    tl.appendChild(item);
  });
}
document.getElementById('menu-add-btn').onclick=()=>{addingFromYear=null;openAddModal();};

// ── MENU → GALLERY gesture ──
const menuScreen = document.getElementById('screen-menu');
let menuTouchStartY = 0;

function openGallery() {
  activeYear = null;
  renderGallery();
  const gallery = document.getElementById('screen-gallery');
  gallery.classList.remove('hidden');
  // small delay so transition fires
  requestAnimationFrame(()=>requestAnimationFrame(()=>gallery.classList.add('visible')));
  menuScreen.classList.add('hidden');
}

function closeGallery() {
  const gallery = document.getElementById('screen-gallery');
  gallery.classList.remove('visible');
  menuScreen.classList.remove('hidden');
  setTimeout(()=>gallery.classList.add('hidden'), 550);
}

menuScreen.addEventListener('wheel', (e)=>{ if(e.deltaY > 40) openGallery(); }, { passive: true });
menuScreen.addEventListener('touchstart', (e)=>{ menuTouchStartY = e.touches[0].clientY; }, { passive: true });
menuScreen.addEventListener('touchend', (e)=>{
  const dy = menuTouchStartY - e.changedTouches[0].clientY;
  if(dy > 60) openGallery();
}, { passive: true });

document.getElementById('gallery-back-btn').onclick = closeGallery;
document.getElementById('gallery-logo-btn').onclick = ()=>{ closeGallery(); };

// swipe up from gallery to go back
const galleryWrap = document.getElementById('gallery-wrap');
let galleryTouchStartY = 0;
galleryWrap.addEventListener('touchstart', (e)=>{ galleryTouchStartY = e.touches[0].clientY; }, { passive: true });
galleryWrap.addEventListener('touchend', (e)=>{
  if(galleryWrap.scrollTop === 0) {
    const dy = e.changedTouches[0].clientY - galleryTouchStartY;
    if(dy > 60) closeGallery();
  }
}, { passive: true });

function renderGallery() {
  const masonry = document.getElementById('gallery-masonry');
  masonry.innerHTML = '';
  const sorted = [...memories].sort((a,b)=> parseInt(b.year) - parseInt(a.year));
  if(!sorted.length) {
    masonry.innerHTML = '<div class="gallery-empty" style="column-span:all;">No memories yet</div>';
    return;
  }
  sorted.forEach(m => {
    if(m.file_type !== 'image' || !m.file_url) return;
    const item = document.createElement('div');
    item.className = 'gallery-item';
    const img = document.createElement('img');
    img.src = m.file_url; img.alt = '';
    const overlay = document.createElement('div');
    overlay.className = 'gallery-overlay';
    const cap = document.createElement('span');
    cap.className = 'gallery-caption';
    cap.textContent = m.note || '';
    overlay.appendChild(cap);
    item.append(img, overlay);
    item.onclick = () => { activeYear = null; openArtModal(m); };
    masonry.appendChild(item);
  });
}

// Year grid
function renderYear(){
  document.getElementById('year-back-btn').textContent=activeYear;
  const grid=document.getElementById('year-grid');grid.innerHTML='';
  const items=forYear(activeYear);
  if(!items.length){grid.innerHTML='<div class="year-empty" style="grid-column:1/-1;">Nothing here yet</div>';return;}
  items.forEach(m=>{
    const cell=document.createElement('div');cell.className='grid-item';
    if(m.file_type==='image'&&m.file_url){const img=document.createElement('img');img.src=m.file_url;img.alt='';cell.appendChild(img);}
    else{cell.classList.add(accentCls(m.id));const pd=document.createElement('div');pd.className='grid-item-pdf';pd.textContent='PDF';cell.appendChild(pd);}
    const overlay=document.createElement('div');overlay.className='grid-overlay';
    const caption=document.createElement('span');caption.className='grid-caption';caption.textContent=m.note||'';
    overlay.appendChild(caption);cell.appendChild(overlay);
    cell.onclick=()=>openArtModal(m);
    grid.appendChild(cell);
  });
}
document.getElementById('year-back-btn').onclick=()=>{showScreen('menu');renderMenu();};
document.getElementById('year-add-btn').onclick=()=>{addingFromYear=activeYear;openAddModal();};
document.getElementById('year-logo-btn').onclick=()=>{showScreen('menu');renderMenu();};

// Art modal
function openArtModal(m){viewMem=m;renderArtModal();document.getElementById('art-modal').classList.remove('hidden');}
function closeArtModal(){document.getElementById('art-modal').classList.add('hidden');document.getElementById('art-edit-panel').classList.remove('open');viewMem=null;}

function getModalList() {
  if(activeYear) return forYear(activeYear);
  return [...memories].sort((a,b)=>parseInt(b.year)-parseInt(a.year));
}
function renderArtModal(){
  const m=viewMem;
  const media=document.getElementById('art-modal-media');media.innerHTML='';
  const modalInner=document.querySelector('.art-modal-inner');
  modalInner.classList.remove('portrait');
  if(m.file_type==='image'&&m.file_url){
    const img=document.createElement('img');img.src=m.file_url;img.alt='';
    img.onload=()=>{ if(img.naturalHeight>img.naturalWidth) modalInner.classList.add('portrait'); };
    media.appendChild(img);
  } else {
    const pd=document.createElement('div');pd.className='art-modal-media-pdf';pd.textContent=m.file_name||'document.pdf';media.appendChild(pd);
  }

  // info bar text
  const txt=document.getElementById('art-modal-text');
  const parts=[];
  if(m.date_created) parts.push(m.date_created);
  if(m.note) parts.push(m.note);
  txt.textContent=parts.join(' · ')||'';

  // populate edit panel fields
  document.getElementById('art-date-input').value=m.date_created||'';
  document.getElementById('art-note-input').value=m.note||'';
  document.getElementById('art-edit-panel').classList.remove('open');

  // prev/next arrows
  const items=getModalList();const idx=items.findIndex(x=>x.id===m.id);
  document.getElementById('art-prev-btn').disabled=idx<=0;
  document.getElementById('art-next-btn').disabled=idx>=items.length-1;
}

document.getElementById('art-close-btn').onclick=closeArtModal;
document.getElementById('art-modal').onclick=e=>{if(e.target===document.getElementById('art-modal'))closeArtModal();};

// arrow hover via JS to avoid CSS override issues
['art-prev-btn','art-next-btn'].forEach(id=>{
  const btn=document.getElementById(id);
  btn.addEventListener('mouseenter',()=>{ if(!btn.disabled) btn.style.opacity='0.7'; });
  btn.addEventListener('mouseleave',()=>{ btn.style.opacity=btn.disabled?'0.08':'0.3'; });
});

// icon button hover via JS
function setupIconHover(btnId, iconSelector) {
  const btn=document.getElementById(btnId);
  const icon=btn.querySelector('svg');
  btn.addEventListener('mouseenter',()=>{ btn.style.background='rgba(245,240,200,0.7)'; icon.style.opacity='0.75'; });
  btn.addEventListener('mouseleave',()=>{ btn.style.background=''; icon.style.opacity='0.35'; });
}
setupIconHover('art-edit-btn','svg');
setupIconHover('art-del-btn','svg');

document.getElementById('art-prev-btn').onclick=()=>{
  const items=getModalList();const idx=items.findIndex(x=>x.id===viewMem.id);
  if(idx>0){viewMem=items[idx-1];renderArtModal();}
};
document.getElementById('art-next-btn').onclick=()=>{
  const items=getModalList();const idx=items.findIndex(x=>x.id===viewMem.id);
  if(idx<items.length-1){viewMem=items[idx+1];renderArtModal();}
};

document.getElementById('art-edit-btn').onclick=()=>{
  document.getElementById('art-edit-panel').classList.toggle('open');
};

document.getElementById('art-save-btn').onclick=async()=>{
  const saveBtn=document.getElementById('art-save-btn');
  const newDate=document.getElementById('art-date-input').value||null;
  const newNote=document.getElementById('art-note-input').value.trim()||null;
  saveBtn.textContent='Saving…';saveBtn.disabled=true;
  try{
    const [updated]=await dbUpdate('memories',viewMem.id,{date_created:newDate,note:newNote});
    const idx=memories.findIndex(x=>x.id===viewMem.id);if(idx>-1)memories[idx]=updated;
    viewMem=updated;
    const parts=[];if(updated.date_created)parts.push(updated.date_created);if(updated.note)parts.push(updated.note);
    document.getElementById('art-modal-text').textContent=parts.join(' · ')||'';
    saveBtn.textContent='Saved ✓';
    setTimeout(()=>{saveBtn.textContent='Save changes';saveBtn.disabled=false;document.getElementById('art-edit-panel').classList.remove('open');},1200);
  }catch(e){saveBtn.textContent='Error';saveBtn.disabled=false;}
};

document.getElementById('art-del-btn').onclick=async()=>{
  if(!confirm('Delete this memory?'))return;
  showLoading(true);
  try{if(viewMem.storage_path)await storageDelete('memories',viewMem.storage_path);await dbDelete('memories',viewMem.id);memories=memories.filter(x=>x.id!==viewMem.id);}
  catch(e){alert('Delete failed: '+e.message);}
  showLoading(false);closeArtModal();renderYear();
};

// Add modal
function openAddModal(){
  document.getElementById('modal-add').classList.remove('hidden');
  document.getElementById('form-year').value=addingFromYear||'';
  document.getElementById('upload-progress').textContent='';
  const dateInput=document.getElementById('form-date');
  const yearInput=document.getElementById('form-year');
  dateInput.onchange=()=>{ if(dateInput.value&&!yearInput.value) yearInput.value=dateInput.value.split('-')[0]; };
}
function closeAddModal(){
  document.getElementById('modal-add').classList.add('hidden');
  pendingFile=null;pendingFileType=null;pendingFileName=null;
  document.getElementById('file-zone-text').textContent='Tap to upload';
  document.getElementById('file-preview').innerHTML='';
  document.getElementById('form-year').value='';
  document.getElementById('form-date').value='';
  document.getElementById('form-note').value='';
  document.getElementById('upload-progress').textContent='';
  document.getElementById('form-submit').disabled=false;
}
document.getElementById('add-close-btn').onclick=closeAddModal;
document.getElementById('modal-add').onclick=e=>{if(e.target===document.getElementById('modal-add'))closeAddModal();};

const fzone=document.getElementById('file-zone'),finput=document.getElementById('file-input');
fzone.onclick=()=>finput.click();
fzone.ondragover=e=>e.preventDefault();
fzone.ondrop=e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)handleFile(f);};
finput.onchange=()=>{if(finput.files[0])handleFile(finput.files[0]);};
function handleFile(f){
  pendingFile=f;pendingFileName=f.name;pendingFileType=f.type.startsWith('image')?'image':'pdf';
  document.getElementById('file-preview').innerHTML='';
  if(pendingFileType==='image'){const url=URL.createObjectURL(f);const img=document.createElement('img');img.className='file-prev';img.src=url;document.getElementById('file-preview').appendChild(img);}
  document.getElementById('file-zone-text').textContent=f.name;
}

document.getElementById('form-submit').onclick=async()=>{
  if(!pendingFile){alert('Please upload a file.');return;}
  const yr=document.getElementById('form-year').value;
  if(!yr){alert('Please enter a year.');return;}
  const btn=document.getElementById('form-submit');
  const prog=document.getElementById('upload-progress');
  btn.disabled=true;
  prog.textContent='Saving…';
  try{
    const ext=pendingFileName.split('.').pop();
    const path=`${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const fileUrl=await storageUpload('memories',path,pendingFile);
    const [inserted]=await dbInsert('memories',{year:parseInt(yr),date_created:document.getElementById('form-date').value||null,note:document.getElementById('form-note').value.trim()||null,file_url:fileUrl,file_type:pendingFileType,file_name:pendingFileName,storage_path:path});
    memories.unshift(inserted);closeAddModal();activeYear=String(yr);showScreen('year');renderYear();
  }catch(e){
    prog.textContent='Error: '+e.message;
    btn.disabled=false;
  }
};
</script>
</body>
</html>
