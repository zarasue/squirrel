  --toggle-track: #d5d3cf; --toggle-thumb: #1a1fd4;
  --toggle-thumb-text: #fff; --toggle-inactive: #aaa;
  --input-bg: #f5f4f1; --input-border: #e0deda;
  --btn-border: #d5d3cf;
  --bar-empty: #e4e2de; --bar-fill: #1a1fd4;
}
html, body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  transition: background 0.25s, color 0.25s;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
html {
  height: -webkit-fill-available;
}

/* ── SPLASH ── */
#splash {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; z-index: 200; background: #0d0d0d;
  transition: opacity 0.5s ease;
}
#splash.fade-out { opacity: 0; pointer-events: none; }
.splash-fill {
  position: absolute; bottom: 0; left: 0; right: 0; height: 100%;
  background: #1a1fd4; transform: translateY(100%);
  animation: riseFill 1.6s cubic-bezier(0.4,0,0.2,1) 0.3s forwards;
}
@keyframes riseFill { 0% { transform: translateY(100%); } 100% { transform: translateY(0%); } }
.splash-logo {
  position: relative; z-index: 2;
  font-size: 52px; font-weight: 700; color: #fff; letter-spacing: -0.03em;
}

/* ── APP SHELL ── */
#app {
  max-width: 480px; margin: 0 auto;
  padding: env(safe-area-inset-top, 44px) 1.5rem env(safe-area-inset-bottom, 2rem);
  opacity: 0; transition: opacity 0.45s ease;
  min-height: 100vh;
}
#app.visible { opacity: 1; }

/* ── HEADER ── */
.header {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; padding: 2rem 0 1.75rem;
}
.logo { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
.header-right { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 0.5px solid var(--border2); background: var(--card);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0; color: var(--text2);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.icon-btn:hover { border-color: var(--text2); }
.icon-btn.active-settings { background: var(--brand); border-color: var(--brand); color: #fff; }
.icon-btn svg { width: 14px; height: 14px; }

/* ── NAV TOGGLE ── */
.nav-toggle {
  position: relative; display: flex;
  background: var(--toggle-track); border-radius: 100px;
  padding: 4px; transition: background 0.25s;
}
.nav-thumb {
  position: absolute; top: 4px; bottom: 4px;
  border-radius: 100px; background: var(--toggle-thumb);
  transition: left 0.28s cubic-bezier(0.4,0,0.2,1), width 0.28s cubic-bezier(0.4,0,0.2,1);
  z-index: 0; pointer-events: none;
}
.nav-tab {
  position: relative; z-index: 1;
  font-size: 13px; font-weight: 500; color: var(--toggle-inactive);
  background: none; border: none; padding: 10px 22px;
  cursor: pointer; font-family: 'Inter', -apple-system, sans-serif;
  border-radius: 100px; transition: color 0.22s;
  white-space: nowrap; letter-spacing: -0.01em;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  min-height: 44px; display: flex; align-items: center;
}
.nav-tab.active { color: var(--toggle-thumb-text); }

/* ── DATE ── */
.date-row { margin-bottom: 1.5rem; }
.date-label { font-size: 24px; font-weight: 300; color: var(--text); letter-spacing: -0.02em; }

/* ── PAGES ── */
.page { display: none; padding-bottom: 3rem; }
.page.active { display: block; }

/* ── WIDGETS ── */
.widget {
  background: var(--card); border-radius: 20px;
  padding: 1.4rem 1.4rem 1.5rem; margin-bottom: 10px;
  transition: background 0.25s;
}
.widget-label {
  font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text2); margin-bottom: 1rem;
}

/* ── DOT GRID ── */
.dot-grid {
  display: grid; grid-template-columns: repeat(16, 1fr);
  gap: 5px; margin-bottom: 1.2rem;
}
.dot { width: 100%; aspect-ratio: 1; border-radius: 50%; background: var(--dot-empty); transition: background 0.18s; }
.dot.filled { background: var(--dot-filled); }
.dot.goal-filled { background: var(--dot-blue); }

/* ── WATER ── */
.water-stats { display: flex; align-items: baseline; gap: 7px; margin-bottom: 2px; }
.water-count { font-size: 48px; font-weight: 300; line-height: 1; letter-spacing: -0.04em; color: var(--text); user-select: none; }
.water-unit { font-size: 14px; color: var(--text2); }
.water-sub { font-size: 12px; color: var(--text3); margin-bottom: 1.25rem; }
.water-actions { display: flex; align-items: center; gap: 8px; }
.add-btn {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 12px; font-weight: 500; color: #fff;
  background: var(--brand); border: none; border-radius: 100px;
  padding: 11px 22px; cursor: pointer;
  font-family: 'Inter', -apple-system, sans-serif;
  transition: opacity 0.15s; letter-spacing: 0.04em;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  min-height: 44px;
}
.add-btn:hover { opacity: 0.88; }
.add-btn:active { transform: scale(0.97); }
.ghost-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text3); background: none;
  border: none; padding: 8px 4px; cursor: pointer;
  font-family: 'Inter', -apple-system, sans-serif; transition: color 0.15s;
}
.ghost-btn:hover { color: var(--text2); }
.water-log { margin-top: 12px; display: flex; flex-direction: column; gap: 5px; }
.log-entry { display: flex; align-items: center; justify-content: space-between; }
.log-time { font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums; }
.log-remove {
  width: 18px; height: 18px; border: none; background: none;
  color: var(--text3); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.15s; font-family: 'Inter', sans-serif; padding: 0;
}
.log-remove:hover { color: var(--text2); }

/* ── HEADACHE ── */
.ha-empty { font-size: 15px; color: var(--text3); line-height: 1.5; }
.severity-row { display: flex; align-items: center; gap: 7px; margin: 14px 0 1.1rem; flex-wrap: wrap; }
.sev-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 0.5px solid var(--border2); background: none;
  font-size: 13px; font-weight: 500; color: var(--text2);
  cursor: pointer; font-family: 'Inter', -apple-system, sans-serif;
  transition: all 0.12s; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.sev-btn:hover { border-color: var(--brand); color: var(--brand); }
.sev-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
.sev-label { font-size: 12px; color: var(--text2); margin-left: 4px; }
.ha-sev-big { font-size: 42px; font-weight: 300; color: var(--text); line-height: 1; letter-spacing: -0.03em; }
.ha-sev-sub { font-size: 12px; color: var(--text2); margin-top: 5px; }
.ha-note { font-size: 13px; color: var(--text2); margin-top: 10px; line-height: 1.6; }
.edit-link {
  font-size: 11px; color: var(--brand); cursor: pointer;
  margin-top: 12px; display: inline-block; background: none;
  border: none; font-family: 'Inter', -apple-system, sans-serif;
}
.no-ha-btn {
  font-size: 12px; color: var(--text3); background: none; border: none;
  cursor: pointer; font-family: 'Inter', -apple-system, sans-serif;
  margin-top: 12px; display: block;
}
.no-ha-btn:hover { color: var(--text2); }

/* ── CHART ── */
.chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
.chart-legend { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
.legend-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand); }
.chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 90px; }
.bar-col { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
.bar-track {
  flex: 1; width: 100%; background: var(--bar-empty);
  border-radius: 100px; position: relative; overflow: hidden; min-height: 70px;
}
.bar-fill {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--bar-fill); border-radius: 100px;
  transition: height 0.4s cubic-bezier(0.4,0,0.2,1);
}
.bar-label { font-size: 10px; color: var(--text3); font-weight: 500; letter-spacing: 0.03em; }
.bar-label.today { color: var(--text); }

/* ── STREAK ── */
.streak-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
.streak-num { font-size: 52px; font-weight: 300; color: var(--text); line-height: 1; letter-spacing: -0.04em; }
.streak-unit { font-size: 12px; color: var(--text2); margin-top: 3px; }
.streak-best-num { font-size: 24px; font-weight: 300; color: var(--text2); line-height: 1; letter-spacing: -0.02em; }
.streak-best-label { font-size: 11px; color: var(--text3); margin-top: 3px; }
.streak-dots { display: flex; gap: 5px; }
.streak-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--dot-empty); }
.streak-dot.hit { background: var(--brand); }
.streak-dot.today-miss { background: var(--dot-empty); border: 1.5px solid var(--border2); }

/* ── WEEK GROUPS ── */
.week-group { margin-bottom: 8px; }
.week-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; background: var(--card); border-radius: 14px;
  cursor: pointer; user-select: none; transition: opacity 0.15s;
}
.week-header:hover { opacity: 0.85; }
.week-header-left { display: flex; flex-direction: column; gap: 3px; }
.week-range { font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: -0.01em; }
.week-summary { font-size: 11px; color: var(--text2); }
.week-header-right { display: flex; align-items: center; gap: 10px; }

.week-mini-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dot-empty); }
.week-mini-dot.hit { background: var(--brand); }
.week-chevron { color: var(--text3); transition: transform 0.22s; display: flex; align-items: center; }
.week-chevron.open { transform: rotate(180deg); }
.week-body { overflow: hidden; max-height: 0; transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1); }
.week-body.open { max-height: 2000px; }
.week-days { padding: 4px 0 6px; }
.history-day { border-bottom: 0.5px solid var(--border); padding: 1.1rem 16px; }
.history-day:last-child { border-bottom: none; padding-bottom: 0; }
.hd-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
.hd-date { font-size: 13px; font-weight: 500; color: var(--text); }
.hd-cups { font-size: 11px; color: var(--text3); }
.history-dot-row { display: grid; grid-template-columns: repeat(16,1fr); gap: 4px; margin-bottom: 8px; }
.hdot { width: 100%; aspect-ratio: 1; border-radius: 50%; background: var(--dot-empty); }
.hdot.filled { background: var(--dot-filled); }
.hdot.blue { background: var(--brand); }
.h-sev { font-size: 18px; font-weight: 300; color: var(--text); }
.h-sev-lbl { font-size: 12px; color: var(--text2); }
.h-note { font-size: 12px; color: var(--text3); margin-top: 3px; line-height: 1.5; }
.h-none { font-size: 12px; color: var(--text3); }
.hd-edit-ha {
  font-size: 11px; color: var(--brand); background: none; border: none;
  cursor: pointer; font-family: 'Inter', sans-serif; margin-top: 6px;
  display: inline-block; padding: 0;
}
.empty-log { font-size: 13px; color: var(--text3); padding: 1rem 0; }

/* ── SETTINGS PAGE ── */
.settings-section { margin-bottom: 2rem; }
.settings-section-label {
  font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text2); margin-bottom: 10px;
}
.settings-row {
  background: var(--card); border-radius: 14px;
  padding: 14px 16px; margin-bottom: 6px;

.settings-row-label { font-size: 14px; color: var(--text); }
.settings-row-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.settings-input {
  border: 0.5px solid var(--input-border); border-radius: 8px;
  padding: 6px 10px; font-size: 13px; color: var(--text);
  background: var(--input-bg); font-family: 'Inter', sans-serif;

}
.settings-input:focus { border-color: var(--brand); }
.settings-select {
  border: 0.5px solid var(--input-border); border-radius: 8px;
  padding: 6px 10px; font-size: 13px; color: var(--text);
  background: var(--input-bg); font-family: 'Inter', sans-serif;

}
.toggle-switch {

}
.toggle-switch.on { background: var(--brand); }
.toggle-knob {

}

  padding: 8px 12px; font-size: 13px; color: var(--text);
  background: var(--input-bg); font-family: 'Inter', sans-serif;
  outline: none; width: 100%; margin-bottom: 1.2rem;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(28px + env(safe-area-inset-bottom, 0px));
  left: 50%; transform: translateX(-50%);
  background: var(--brand); color: #fff;
  font-size: 11px; font-weight: 500; padding: 7px 16px;
  border-radius: 100px; font-family: 'Inter', sans-serif;
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
  white-space: nowrap; letter-spacing: 0.06em; z-index: 300;
}

.state-msg {
  font-size: 13px; color: var(--text3);
  padding: 2rem 0; text-align: center;
}

  border-radius: 12px; padding: 12px 16px;
  font-size: 12px; color: #f09595; margin-bottom: 12px;
}

<script>
// ─────────────────────────────────────────────
// CONFIG — replace with your Supabase values
// ─────────────────────────────────────────────
const SUPABASE_URL = 'https://neeebqnjiqbstgmwrssa.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_2lqn5YnXybpMrdEMm7BKow_MfB_If6d';

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const DB_READY = SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';

// ─────────────────────────────────────────────
// CONSTANTS & STATE
// ─────────────────────────────────────────────
const DOTS = 16;
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const WDAYS  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DS     = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MS     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const SL     = ['','very mild','mild','moderate','strong','severe'];

let settings = { goal: 8, cupSize: 250, unit: 'ml', theme: 'dark' };
let todayWater = null;   // { id, date, cups: [] }
let todayHa    = null;   // { id, date, severity, notes }
let isLight    = false;
let haModalMode = 'today'; // 'today' | 'past'
let haEditSev   = null;
let selQuickTime = null;

function todayKey() {
  return localDateKey(new Date());
}
function localDateKey(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
function fmt(iso)   { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
function pad(n)     { return String(n).padStart(2,'0'); }

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─────────────────────────────────────────────
// SUPABASE — SETTINGS
// ─────────────────────────────────────────────
async function loadSettings() {
  if (!DB_READY) return;
  try {
    const { data, error } = await db.from('settings').select('key, value');
    if (error) throw error;
    if (data) {
      data.forEach(row => {
        if (row.key === 'cup_goal')   settings.goal    = parseInt(row.value) || 8;
        if (row.key === 'cup_size')   settings.cupSize = parseInt(row.value) || 250;
        if (row.key === 'unit')       settings.unit    = row.value || 'ml';
        if (row.key === 'theme')      settings.theme   = row.value || 'dark';
      });
    }
  } catch(e) { /* use defaults */ }
  applyTheme(settings.theme === 'light');
  syncSettingsUI();
}

async function saveSetting(key, value) {
  await db.from('settings').upsert({ key, value: String(value) }, { onConflict: 'key' });
}

// ─────────────────────────────────────────────
// SUPABASE — WATER
// ─────────────────────────────────────────────
async function loadTodayWater() {
  if (!DB_READY) { todayWater = { date: todayKey(), cups: [] }; return; }
  const { data, error } = await db
    .from('water_logs')
    .select('*')
    .eq('date', todayKey())
    .maybeSingle();
  if (error) console.error(error);
  // Only accept data if it's genuinely for today
  todayWater = (data && data.date === todayKey()) ? data : { date: todayKey(), cups: [] };
}

async function saveTodayWater() {
  if (!DB_READY) { renderWater(); renderChart(); return; }
  try {
    const { data, error } = await db
      .from('water_logs')
      .upsert({ ...todayWater }, { onConflict: 'date' })
      .select()
      .single();
    if (error) throw error;
    if (data) todayWater = data;
  } catch(e) {
    console.error('saveTodayWater failed:', e);
    showToast('save failed — check connection');
  }
  renderWater();
  renderChart();
}

async function loadWaterRange(startDate, endDate) {
  const { data } = await db
    .from('water_logs')
    .select('date, cups')
    .gte('date', startDate)
    .lte('date', endDate);
  return data || [];
}

// ─────────────────────────────────────────────
// SUPABASE — HEADACHE
// ─────────────────────────────────────────────
async function loadTodayHa() {
  if (!DB_READY) { todayHa = null; return; }
  const { data, error } = await db
    .from('headache_logs')
    .select('*')
    .eq('date', todayKey())
    .maybeSingle();
  if (error) console.error(error);
  // Only accept data if it's genuinely for today
  todayHa = (data && data.date === todayKey()) ? data : null;
}

async function saveHaEntry(date, severity, notes) {
  const payload = { date, severity, notes: notes || '', saved_at: new Date().toISOString() };
  const { data, error } = await db
    .from('headache_logs')
    .upsert(payload, { onConflict: 'date' })
    .select()
    .single();
  if (error) { showToast('error saving — check connection'); return; }
  if (date === todayKey()) todayHa = data;
  return data;
}

async function loadHaRange(startDate, endDate) {
  const { data } = await db
    .from('headache_logs')
    .select('date, severity, notes')
    .gte('date', startDate)
    .lte('date', endDate);
  return data || [];
}

// ─────────────────────────────────────────────
// RENDER — WATER
// ─────────────────────────────────────────────
function renderWater() {
  // Discard cached water if it isn't for today
  if (todayWater && todayWater.date && todayWater.date !== todayKey()) {
    todayWater = { date: todayKey(), cups: [] };
  }
  const cups  = (todayWater?.cups || []).sort();
  const count = cups.length;
  const goal  = settings.goal;

  // dots
  const grid   = document.getElementById('dot-grid');
  const filled = Math.round((Math.min(count, goal) / goal) * DOTS);
  grid.innerHTML = '';
  for (let i = 0; i < DOTS; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < filled ? (count >= goal ? ' goal-filled' : ' filled') : '');
    grid.appendChild(d);
  }

  document.getElementById('water-count').textContent = count;
  document.getElementById('water-sub').textContent   = count >= goal
    ? `goal reached · ${count} total`
    : `of ${goal} today`;
  // log list
  const log = document.getElementById('water-log');
  if (!count) { log.innerHTML = ''; return; }
  log.innerHTML = cups.slice().reverse().map(iso =>
    `<div class="log-entry">
      <span class="log-time">${fmt(iso)}</span>
      <button class="log-remove" data-iso="${iso}">×</button>
    </div>`
  ).join('');
  log.querySelectorAll('.log-remove').forEach(btn => {
    btn.onclick = async () => {
      const i = todayWater.cups.indexOf(btn.dataset.iso);
      if (i > -1) todayWater.cups.splice(i, 1);
      await saveTodayWater();
      showToast('removed');
    };
  });
}

// ─────────────────────────────────────────────
// RENDER — HEADACHE (TODAY)
// ─────────────────────────────────────────────
function renderHeadache() {
  // Discard any cached entry that isn't for today
  if (todayHa && todayHa.date && todayHa.date !== todayKey()) todayHa = null;
  const area = document.getElementById('headache-area');
  if (todayHa) {
    const sev = todayHa.severity;
    area.innerHTML = `
      <div class="ha-sev-big">${sev}<span style="font-size:18px;color:var(--text3)"> /5</span></div>
      <div class="ha-sev-sub">${SL[sev]}</div>
      ${todayHa.notes ? `<div class="ha-note">${todayHa.notes}</div>` : ''}
      <div style="display:flex;gap:12px;margin-top:12px;align-items:center">
        <button class="edit-link" id="edit-ha-today">edit</button>
        <button class="edit-link" id="log-past-ha" style="color:var(--text3)">log for a past day</button>
      </div>`;
    document.getElementById('edit-ha-today').onclick = () => openHaModal('today', todayHa.severity, todayHa.notes);
    document.getElementById('log-past-ha').onclick   = () => openHaModal('past');
  } else {
    area.innerHTML = `
      <div class="ha-empty">Any headaches today?</div>
      <div style="display:flex;gap:12px;margin-top:12px">
        <button class="add-btn" style="font-size:12px;padding:8px 16px" id="log-ha-today">log headache</button>
        <button class="ghost-btn" id="log-past-ha2">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          past day
        </button>
      </div>
      <button class="no-ha-btn" id="no-ha-today">no headache today</button>`;
    document.getElementById('log-ha-today').onclick  = () => openHaModal('today');
    document.getElementById('log-past-ha2').onclick  = () => openHaModal('past');
    document.getElementById('no-ha-today').onclick   = async () => {
      await saveHaEntry(todayKey(), 0, 'none');
      todayHa = { date: todayKey(), severity: 0, notes: 'none' };
      renderHeadache();
      showToast('noted');
    };
  }

  // handle "no headache" sentinel
  if (todayHa && todayHa.severity === 0) {
    area.innerHTML = `
      <div style="font-size:14px;color:var(--text3)">no headache today</div>
      <div style="display:flex;gap:12px;margin-top:10px;align-items:center">
        <button class="no-ha-btn" id="undo-no-ha" style="margin:0">undo</button>
        <button class="edit-link" id="log-past-ha3" style="color:var(--text3)">log for a past day</button>
      </div>`;
    document.getElementById('undo-no-ha').onclick  = async () => {
      await db.from('headache_logs').delete().eq('date', todayKey());
      todayHa = null; renderHeadache();
    };
    document.getElementById('log-past-ha3').onclick = () => openHaModal('past');
  }
}

// ─────────────────────────────────────────────
// HEADACHE MODAL
// ─────────────────────────────────────────────
function openHaModal(mode, editSev = null, editNotes = '') {
  haModalMode = mode;
  haEditSev   = editSev;
  const modal = document.getElementById('ha-modal');
  const title = document.getElementById('ha-modal-title');
  const sub   = document.getElementById('ha-modal-sub');
  const dateInput = document.getElementById('ha-date-input');
  const notes = document.getElementById('ha-notes');

  notes.value = editNotes || '';

  if (mode === 'today') {
    title.textContent = editSev ? 'Edit headache' : 'Log headache';
    sub.textContent   = 'Today · ' + new Date().toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
    dateInput.classList.add('hidden');
  } else {
    title.textContent = 'Log for a past day';
    sub.textContent   = 'Choose a date and log your headache';
    const yesterday   = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    dateInput.value   = yesterday.toISOString().slice(0,10);
    dateInput.max     = new Date(Date.now() - 86400000).toISOString().slice(0,10);
    dateInput.classList.remove('hidden');
  }

  renderHaSevRow(editSev);
  modal.classList.remove('hidden');
}

function renderHaSevRow(selected) {
  const row = document.getElementById('ha-sev-row');
  row.innerHTML = [1,2,3,4,5].map(n =>
    `<button class="sev-btn${selected===n?' active':''}" data-sev="${n}">${n}</button>`
  ).join('') + `<span class="sev-label">${selected ? SL[selected] : 'severity'}</span>`;
  row.querySelectorAll('.sev-btn').forEach(b => {
    b.onclick = () => { haEditSev = parseInt(b.dataset.sev); renderHaSevRow(haEditSev); };
  });
}

document.getElementById('ha-modal-cancel').onclick = () => {
  document.getElementById('ha-modal').classList.add('hidden');
  haEditSev = null;
};
document.getElementById('ha-modal').onclick = e => {
  if (e.target === document.getElementById('ha-modal')) {
    document.getElementById('ha-modal').classList.add('hidden');
    haEditSev = null;
  }
};
document.getElementById('ha-modal-confirm').onclick = async () => {
  if (!haEditSev) { showToast('pick a severity'); return; }
  const notes = document.getElementById('ha-notes').value.trim();
  const date  = haModalMode === 'today'
    ? todayKey()
    : document.getElementById('ha-date-input').value;
  if (!date) { showToast('pick a date'); return; }

  await saveHaEntry(date, haEditSev, notes);
  document.getElementById('ha-modal').classList.add('hidden');
  haEditSev = null;
  renderHeadache();
  showToast('saved');
  // refresh log if visible
  if (document.getElementById('page-log').classList.contains('active')) renderLog();
};

// ─────────────────────────────────────────────
// WATER MODAL (retroactive time picker)
// ─────────────────────────────────────────────
function openWaterModal() {
  selQuickTime = null;
  const now = new Date();
  document.getElementById('time-custom-input').value = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

  const qd = document.getElementById('time-quick');
  const slots = [];
  for (let i = 1; i <= 5; i++) {
    const d = new Date(now); d.setMinutes(d.getMinutes() - i * 30);
    if (d.getHours() >= 5) slots.push(d);
  }
  qd.innerHTML = slots.map(d => {
    const lbl = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    return `<button class="tq-btn" data-iso="${d.toISOString()}" data-lbl="${lbl}">${lbl}</button>`;
  }).join('') + `<button class="tq-btn selected" data-iso="${now.toISOString()}" data-lbl="now">now</button>`;
  selQuickTime = now.toISOString();

  qd.querySelectorAll('.tq-btn').forEach(btn => {
    btn.onclick = () => {
      qd.querySelectorAll('.tq-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selQuickTime = btn.dataset.iso;
      if (btn.dataset.lbl !== 'now') {
        const [hh, mm] = btn.dataset.lbl.split(':');
        document.getElementById('time-custom-input').value = `${hh}:${mm}`;
      } else {
        document.getElementById('time-custom-input').value = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
      }
    };
  });
  document.getElementById('time-custom-input').oninput = () => {
    selQuickTime = null;
    qd.querySelectorAll('.tq-btn').forEach(b => b.classList.remove('selected'));
  };
  document.getElementById('water-modal').classList.remove('hidden');
}

document.getElementById('water-modal-cancel').onclick = () => document.getElementById('water-modal').classList.add('hidden');
document.getElementById('water-modal').onclick = e => { if (e.target === document.getElementById('water-modal')) document.getElementById('water-modal').classList.add('hidden'); };
document.getElementById('water-modal-confirm').onclick = async () => {
  let iso;
  if (selQuickTime) {
    iso = selQuickTime;
  } else {
    const val = document.getElementById('time-custom-input').value;
    if (!val) { showToast('pick a time'); return; }
    const [h, m] = val.split(':').map(Number);
    const d = new Date(); d.setHours(h, m, 0, 0);
    iso = d.toISOString();
  }
  todayWater.cups.push(iso);
  todayWater.cups.sort();
  await saveTodayWater();
  document.getElementById('water-modal').classList.add('hidden');
  if (todayWater.cups.length === settings.goal) showToast('goal reached!');
  else showToast('added at ' + fmt(iso));
};

// ─────────────────────────────────────────────
// RENDER — 7-DAY CHART
// ─────────────────────────────────────────────
async function renderChart() {
  const bars = document.getElementById('chart-bars');
  bars.innerHTML = '';
  const startD = new Date(); startD.setDate(startD.getDate() - 6);
  const startKey = localDateKey(startD);
  const rows = await loadWaterRange(startKey, todayKey());
  const map = {};
  rows.forEach(r => map[r.date] = (r.cups || []).length);
  // override today with live state
  map[todayKey()] = (todayWater?.cups || []).length;

  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = localDateKey(d);
    days.push({ cups: map[k] || 0, label: i === 0 ? 'today' : DS[d.getDay()], isToday: i === 0 });
  }
  const max = Math.max(...days.map(d => d.cups), settings.goal);
  days.forEach(d => {
    const col = document.createElement('div'); col.className = 'bar-col';
    const pct = max > 0 ? Math.round((d.cups / max) * 100) : 0;
    col.innerHTML = `<div class="bar-track"><div class="bar-fill" style="height:${pct}%"></div></div>
      <div class="bar-label${d.isToday ? ' today' : ''}">${d.label}</div>`;
    bars.appendChild(col);
  });
}

// ─────────────────────────────────────────────
// RENDER — STREAK
// ─────────────────────────────────────────────
async function renderStreakWidget() {
  const wrap = document.getElementById('streak-wrap');
  const startD = new Date(); startD.setDate(startD.getDate() - 60);
  const rows = await loadWaterRange(localDateKey(startD), todayKey());
  const map = {};
  rows.forEach(r => map[r.date] = (r.cups || []).length);
  map[todayKey()] = (todayWater?.cups || []).length;

  let streak = 0, best = 0, cur = 0;
  for (let i = 1; i <= 60; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = localDateKey(d);
    if ((map[k] || 0) >= settings.goal) streak++;
    else break;
  }
  for (let i = 1; i <= 60; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = localDateKey(d);
    if ((map[k] || 0) >= settings.goal) { cur++; }
    else { best = Math.max(best, cur); cur = 0; }
  }
  best = Math.max(best, cur, streak);

  const last7 = [];
  for (let i = 7; i >= 1; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    last7.push((map[localDateKey(d)] || 0) >= settings.goal);
  }
  const todayHit = (map[todayKey()] || 0) >= settings.goal;
  const dotsHtml = last7.map(h => `<div class="streak-dot${h ? ' hit' : ''}"></div>`).join('')
    + `<div class="streak-dot${todayHit ? ' hit' : ' today-miss'}"></div>`;

  wrap.innerHTML = `<div class="widget">
    <div class="widget-label">Streak</div>
    <div class="streak-top">
      <div>
        <div class="streak-num">${streak}</div>
        <div class="streak-unit">day streak</div>
      </div>
      <div style="text-align:right">
        <div class="streak-best-num">${best}</div>
        <div class="streak-best-label">best</div>
      </div>
    </div>
    <div class="streak-dots">${dotsHtml}</div>
  </div>`;
}

// ─────────────────────────────────────────────
// RENDER — LOG PAGE (weekly groups)
// ─────────────────────────────────────────────
async function renderLog() {
  await renderStreakWidget();
  const list = document.getElementById('log-list');
  list.innerHTML = '<div class="state-msg">Loading…</div>';

  const startD = new Date(); startD.setDate(startD.getDate() - 84); // 12 weeks
  const startKey = localDateKey(startD);

  const [waterRows, haRows] = await Promise.all([
    loadWaterRange(startKey, todayKey()),
    loadHaRange(startKey, todayKey())
  ]);

  const waterMap = {}, haMap = {};
  waterRows.forEach(r => waterMap[r.date] = r.cups || []);
  haRows.forEach(r => haMap[r.date] = r);

  // always reflect live today state
  waterMap[todayKey()] = todayWater?.cups || [];
  if (todayHa) haMap[todayKey()] = todayHa;

  // build day keys — today first, then back 84 days
  const keys = [];
  for (let i = 0; i <= 84; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = localDateKey(d);
    if ((waterMap[k] && waterMap[k].length > 0) || haMap[k]) keys.push(k);
  }

  if (!keys.length) { list.innerHTML = '<div class="empty-log">No entries yet. Start logging today!</div>'; return; }

  function getWeekStart(dateStr) {
    const [y,m,d] = dateStr.split('-').map(Number);
    const date = new Date(y, m-1, d);
    const diff = date.getDay() === 0 ? -6 : 1 - date.getDay();
    const mon = new Date(date); mon.setDate(date.getDate() + diff);
    return localDateKey(mon);
  }

  const weeks = {};
  keys.forEach(k => { const ws = getWeekStart(k); if (!weeks[ws]) weeks[ws] = []; weeks[ws].push(k); });
  const weekKeys = Object.keys(weeks).sort().reverse();

  list.innerHTML = weekKeys.map((ws, wi) => {
    const days = weeks[ws].sort().reverse();
    const totalCups = days.reduce((s,k) => s + (waterMap[k] || []).length, 0);
    const goalDays  = days.filter(k => (waterMap[k] || []).length >= settings.goal).length;

    const [wy,wm,wd] = ws.split('-').map(Number);
    const wDate = new Date(wy, wm-1, wd);
    const wEnd  = new Date(wDate); wEnd.setDate(wDate.getDate() + 6);
    const f = d => `${d.getDate()} ${MS[d.getMonth()]}`;

    const miniDots = Array.from({length:7}, (_,i) => {
      const d = new Date(wDate); d.setDate(wDate.getDate() + i);
      const k = localDateKey(d);
      const cups = k === todayKey() ? (todayWater?.cups || []).length : (waterMap[k] || []).length;
      const hit = cups >= settings.goal;
      return `<div class="week-mini-dot${hit ? ' hit' : ''}"></div>`;
    }).join('');

    const dayRows = days.map(key => {
      const cups   = (waterMap[key] || []).length;
      const ha     = haMap[key];
      const filled = Math.round((Math.min(cups, settings.goal) / settings.goal) * DOTS);
      const dotRow = Array.from({length:DOTS}, (_,i) =>
        `<div class="hdot${i < filled ? (cups >= settings.goal ? ' blue' : ' filled') : ''}"></div>`
      ).join('');

      let hHtml = `<div class="h-none">no journal entry</div>`;
      if (ha && ha.severity === 0) hHtml = `<div class="h-none">no headache</div>`;
      else if (ha && ha.severity) hHtml = `
        <span class="h-sev">${ha.severity}</span>
        <span class="h-sev-lbl" style="margin-left:5px">/5 ${SL[ha.severity]}</span>
        ${ha.notes ? `<div class="h-note">${ha.notes}</div>` : ''}`;

      const [y,m,d] = key.split('-').map(Number);
      const dt   = new Date(y, m-1, d);
      const yestD = new Date(); yestD.setDate(yestD.getDate() - 1);
      const yest = localDateKey(yestD);
      const lbl  = key === todayKey() ? 'Today' : key === yest ? 'Yesterday' : DS[dt.getDay()] + ' ' + d + ' ' + MS[m-1];

      return `<div class="history-day">
        <div class="hd-header">
          <div class="hd-date">${lbl}</div>
          <div class="hd-cups">${cups} / ${settings.goal}</div>
        </div>
        <div class="history-dot-row">${dotRow}</div>
        ${hHtml}
        <button class="hd-edit-ha" data-date="${key}" data-sev="${ha?.severity||''}" data-notes="${(ha?.notes||'').replace(/"/g,'&quot;')}">
          ${ha && ha.severity ? 'edit headache' : 'add headache'}
        </button>
      </div>`;
    }).join('');

    return `<div class="week-group">
      <div class="week-header" onclick="toggleWeek(this)">
        <div class="week-header-left">
          <div class="week-range">${f(wDate)} – ${f(wEnd)}</div>
          <div class="week-summary">${totalCups} cups · ${goalDays}/${days.length} days hit goal</div>
        </div>
        <div class="week-header-right">
          <div class="week-mini-dots">${miniDots}</div>
          <div class="week-chevron${wi===0?' open':''}">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
      </div>
      <div class="week-body${wi===0?' open':''}"><div class="week-days">${dayRows}</div></div>
    </div>`;
  }).join('');

  // bind past-day headache edit buttons
  list.querySelectorAll('.hd-edit-ha').forEach(btn => {
    btn.onclick = () => {
      const date  = btn.dataset.date;
      const sev   = btn.dataset.sev ? parseInt(btn.dataset.sev) : null;
      const notes = btn.dataset.notes || '';
      // open ha modal in past mode, pre-fill date
      haModalMode = 'past';
      haEditSev   = sev;
      const modal  = document.getElementById('ha-modal');
      document.getElementById('ha-modal-title').textContent = sev ? 'Edit headache' : 'Add headache';
      document.getElementById('ha-modal-sub').textContent   = '';
      const di = document.getElementById('ha-date-input');
      di.value = date; di.max = new Date(Date.now() - 86400000).toISOString().slice(0,10);
      di.classList.remove('hidden'); di.readOnly = true;
      document.getElementById('ha-notes').value = notes;
      renderHaSevRow(sev);
      modal.classList.remove('hidden');
    };
  });
}

window.toggleWeek = function(header) {
  header.querySelector('.week-chevron').classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
};

// ─────────────────────────────────────────────
// SETTINGS
// ─────────────────────────────────────────────
function syncSettingsUI() {
  document.getElementById('setting-goal').value      = settings.goal;
  document.getElementById('setting-cup-size').value  = settings.cupSize;
  document.getElementById('setting-unit').value      = settings.unit;
  const ts = document.getElementById('theme-toggle-settings');
  if (settings.theme === 'light') ts.classList.add('on'); else ts.classList.remove('on');
}

document.getElementById('theme-toggle-settings').onclick = function() {
  this.classList.toggle('on');
  applyTheme(this.classList.contains('on'));
};

document.getElementById('save-settings-btn').onclick = async () => {
  const goal    = parseInt(document.getElementById('setting-goal').value) || 8;
  const cupSize = parseInt(document.getElementById('setting-cup-size').value) || 250;
  const unit    = document.getElementById('setting-unit').value;
  const theme   = document.getElementById('theme-toggle-settings').classList.contains('on') ? 'light' : 'dark';

  settings.goal = goal; settings.cupSize = cupSize; settings.unit = unit; settings.theme = theme;

  await Promise.all([
    saveSetting('cup_goal', goal),
    saveSetting('cup_size', cupSize),
    saveSetting('unit', unit),
    saveSetting('theme', theme)
  ]);

  renderWater(); showToast('settings saved');
};

document.getElementById('settings-btn').onclick = () => {
  syncSettingsUI();
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-settings').classList.add('active');
  document.getElementById('settings-btn').classList.add('active-settings');
  // deselect toggle visually
  document.getElementById('nav-thumb').style.width = '0';
};

// ─────────────────────────────────────────────
// NAV & THEME
// ─────────────────────────────────────────────
function positionThumb(tab) {
  const toggle = document.getElementById('nav-toggle');
  const thumb  = document.getElementById('nav-thumb');
  const r  = tab.getBoundingClientRect();
  const tr = toggle.getBoundingClientRect();
  thumb.style.left  = (r.left - tr.left) + 'px';
  thumb.style.width = r.width + 'px';
}

document.querySelectorAll('.nav-tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    positionThumb(btn);
    document.getElementById('settings-btn').classList.remove('active-settings');
    const page = document.getElementById('page-' + btn.dataset.page);
    page.classList.add('active');
    if (btn.dataset.page === 'log') renderLog();
  };
});

function applyTheme(light) {
  isLight = light;
  document.body.classList.toggle('light', light);
  const icon = document.getElementById('theme-icon');
  icon.innerHTML = light
    ? `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`
    : `<circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
  setTimeout(() => positionThumb(document.querySelector('.nav-tab.active')), 50);
}

document.getElementById('theme-btn').onclick = () => {
  applyTheme(!isLight);
  settings.theme = isLight ? 'light' : 'dark';
  saveSetting('theme', settings.theme);
  syncSettingsUI();
};

// ─────────────────────────────────────────────
// ADD NOW
// ─────────────────────────────────────────────
document.getElementById('add-now-btn').onclick = async () => {
  todayWater.cups.push(new Date().toISOString());
  todayWater.cups.sort();
  await saveTodayWater();
  if (todayWater.cups.length === settings.goal) showToast('goal reached!');
};
document.getElementById('add-retro-btn').onclick = openWaterModal;

// ─────────────────────────────────────────────
// DATE LABEL
// ─────────────────────────────────────────────
const now = new Date();
document.getElementById('today-date').textContent =
  WDAYS[now.getDay()] + ', ' + MONTHS[now.getMonth()] + ' ' + now.getDate();

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
let _lastLoadedDate = null;

function showApp() {
  const splash = document.getElementById('splash');
  const app    = document.getElementById('app');
  splash.classList.add('fade-out');
  app.classList.add('visible');
  setTimeout(() => {
    splash.style.display = 'none';
    positionThumb(document.querySelector('.nav-tab.active'));
  }, 500);
}

async function reloadDay() {
  // Clear stale state first
  todayWater = { date: todayKey(), cups: [] };
  todayHa    = null;
  _lastLoadedDate = todayKey();
  try { await Promise.all([loadTodayWater(), loadTodayHa()]); } catch(e) { console.warn('reloadDay failed', e); }
  const now = new Date();
  document.getElementById('today-date').textContent =
    WDAYS[now.getDay()] + ', ' + MONTHS[now.getMonth()] + ' ' + now.getDate();
  renderWater();
  renderHeadache();
  renderChart();
}

async function boot() {
  try { await loadSettings(); } catch(e) { console.warn('loadSettings failed', e); }
  try { await Promise.all([loadTodayWater(), loadTodayHa()]); } catch(e) { console.warn('loadData failed', e); }
  _lastLoadedDate = todayKey();
  try { renderWater(); } catch(e) { console.warn(e); }
  try { renderHeadache(); } catch(e) { console.warn(e); }
  try { renderChart(); } catch(e) { console.warn(e); }
}

// Reset whenever app comes back into focus on a new day
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && _lastLoadedDate && _lastLoadedDate !== todayKey()) {
    console.log('55%: new day, reloading');
    reloadDay();
  }
});

// Also check every minute in case the tab stays visible past midnight
setInterval(() => {
  if (_lastLoadedDate && _lastLoadedDate !== todayKey()) {
    console.log('55%: midnight crossed, reloading');
    reloadDay();
  }
}, 60000);

// Boot drives the splash transition
const _splashStart = Date.now();
boot().then(() => {
  setTimeout(showApp, Math.max(0, 2000 - (Date.now() - _splashStart)));
}).catch(() => showApp());
</script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
